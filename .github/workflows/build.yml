name: 构建 H5000M 官方基础固件

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: 主包边界检查
    runs-on: ubuntu-24.04
    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 检查仓库结构与配置
        run: ./scripts/check-main-package.sh

  build:
    name: 官方 ImageBuilder
    needs: check
    runs-on: [self-hosted, Linux, X64, homelab, lxc, openwrt-h5000m]
    timeout-minutes: 60
    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 构建并验证基础固件
        env:
          OPENWRT_LOCAL_CACHE: /home/builder/openwrt-official-cache
          OPENWRT_LOCAL_ARTIFACTS: ${{ github.workspace }}/artifacts
        run: ./scripts/build-official-base-local.sh

      - name: 上传基础固件
        uses: actions/upload-artifact@v4
        with:
          name: H5000M-official-base
          path: artifacts/H5000M-official-base-*/
          if-no-files-found: error
          retention-days: 14
