name: 构建 H5000M 官方基础固件

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_BASE_URL: https://downloads.openwrt.org/snapshots/targets/mediatek/filogic
  IMAGEBUILDER_FILE: openwrt-imagebuilder-mediatek-filogic.Linux-x86_64.tar.zst
  IMAGEBUILDER_SHA256: 29fa3b8bfd15eb08c27e5f8153e1a8077e2f19906738289e27497004c40c270a

jobs:
  build:
    name: 官方 ImageBuilder 基础固件
    runs-on: [self-hosted, Linux, X64, homelab, lxc, openwrt-h5000m]
    timeout-minutes: 60

    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 下载并校验官方 ImageBuilder
        shell: bash
        run: |
          set -euo pipefail
          cache_dir=/home/builder/openwrt-official-cache
          mkdir -p "${cache_dir}"
          archive="${cache_dir}/${IMAGEBUILDER_FILE}"

          if ! echo "${IMAGEBUILDER_SHA256}  ${archive}" | sha256sum -c -; then
            rm -f "${archive}"
            curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors \
              "${OPENWRT_BASE_URL}/${IMAGEBUILDER_FILE}" \
              -o "${archive}"
            echo "${IMAGEBUILDER_SHA256}  ${archive}" | sha256sum -c -
          fi

          rm -rf "${RUNNER_TEMP}/h5000m-imagebuilder"
          mkdir -p "${RUNNER_TEMP}/h5000m-imagebuilder"
          tar --zstd -xf "${archive}" \
            -C "${RUNNER_TEMP}/h5000m-imagebuilder" --strip-components=1

      - name: 构建基础固件
        shell: bash
        run: |
          set -euo pipefail
          imagebuilder="${RUNNER_TEMP}/h5000m-imagebuilder"
          packages="$(sed -e 's/#.*//' -e '/^[[:space:]]*$/d' configs/official-base.packages | tr '\n' ' ')"

          make -C "${imagebuilder}" image \
            PROFILE=hiveton_h5000m \
            PACKAGES="${packages}" \
            FILES="${GITHUB_WORKSPACE}/official-base-files"

      - name: 整理并校验产物
        shell: bash
        run: |
          set -euo pipefail
          target_dir="${RUNNER_TEMP}/h5000m-imagebuilder/bin/targets/mediatek/filogic"
          output_dir="${GITHUB_WORKSPACE}/artifacts/official-base"
          mkdir -p "${output_dir}"

          cp "${target_dir}"/openwrt-mediatek-filogic-hiveton_h5000m-* "${output_dir}/"
          cp "${target_dir}"/profiles.json "${output_dir}/"
          cp "${target_dir}"/sha256sums "${output_dir}/upstream-sha256sums"
          cp configs/official-base.packages "${output_dir}/"
          (cd "${output_dir}" && sha256sum openwrt-* > SHA256SUMS)

          test -s "${output_dir}/openwrt-mediatek-filogic-hiveton_h5000m-squashfs-sysupgrade.bin"
          cat "${output_dir}/SHA256SUMS"

      - name: 上传基础固件
        uses: actions/upload-artifact@v4
        with:
          name: H5000M-official-base
          path: artifacts/official-base
          if-no-files-found: error
          retention-days: 14
